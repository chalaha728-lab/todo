name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter doctor
        run: flutter doctor -v
      - name: Resolve dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze || true
      - name: Build debug APK
        run: flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve dependencies
        run: flutter pub get
      - name: Run unit tests
        run: flutter test || true
      - name: KVM setup for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Boot headless Android emulator
        timeout-minutes: 15
        run: |
          # Install the emulator + system image if not already present
          yes | flutter doctor --android-licenses || true
          flutter devices || true
          # Create an AVD if one does not exist
          if ! flutter emulators | grep -q codesage_avd; then
            flutter emulators --create --name codesage_avd
          fi
          # Boot the emulator in the background and wait for it
          flutter emulators --launch codesage_avd &
          # Wait for boot
          adb wait-for-device
          adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done; input keyevent 82'
      - name: Install APK on emulator
        run: |
          flutter build apk --debug
          adb install -r build/app/outputs/flutter-apk/app-debug.apk
      - name: Launch app and screenshot
        run: |
          adb shell am start -n com.codesage.app/.MainActivity
          sleep 8
          mkdir -p screenshots
          adb exec-out screencap -p > screenshots/home.png
          adb shell input tap 540 1000
          sleep 2
          adb exec-out screencap -p > screenshots/after-tap.png
      - name: Run integration tests (if any)
        run: |
          if [ -d integration_test ]; then
            flutter test integration_test || true
          else
            echo "No integration_test/ directory; skipping."
          fi
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            **/test_output/**
            *.log
          if-no-files-found: ignore
          retention-days: 14

  summary:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## Flutter Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- test:  ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the build job's 'apk' artifact." >> $GITHUB_STEP_SUMMARY
          echo "Download emulator screenshots from the test job's 'screenshots' artifact." >> $GITHUB_STEP_SUMMARY
